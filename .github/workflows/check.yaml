on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: R CMD Check

jobs:
  check:
    runs-on: ${{ matrix.config.os }}
    name: ${{ matrix.config.os }} (R ${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'devel'}
          - {os: windows-latest, r: 'release'}
          - {os: macos-latest,   r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Install BiocManager and set Bioconductor version
        run: |
          install.packages("BiocManager")
          BiocManager::install(version = "3.21", ask = FALSE, update = FALSE)
        shell: Rscript {0}

      - name: Install package dependencies via BiocManager
        run: |
          BiocManager::install(c(
            "remotes", "rcmdcheck",
            "GEOquery", "DESeq2", "edgeR", "limma", "sva", "tximport",
            "clusterProfiler", "msigdbr", "ComplexHeatmap", "BiocParallel",
            "AnnotationDbi", "org.Hs.eg.db", "Biobase", "SummarizedExperiment",
            "S4Vectors", "ggplot2", "ggrepel", "circlize"
          ), ask = FALSE, update = FALSE)
          remotes::install_deps(dependencies = TRUE,
                                repos = BiocManager::repositories())
        shell: Rscript {0}

      - name: R CMD Check
        run: |
          rcmdcheck::rcmdcheck(
            args     = c("--no-manual", "--no-build-vignettes"),
            error_on = "error"
          )
        shell: Rscript {0}
